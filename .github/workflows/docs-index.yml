name: Docs — Regenerar INDEX

# Regenera docs/INDEX.md a partir de docs/features/*.md e commita de volta.
# Dispara só quando as features (ou o gerador) mudam na main.
on:
  push:
    branches: [main]
    paths:
      - 'docs/features/**'
      - 'scripts/generate-index.sh'

permissions:
  contents: write

concurrency:
  group: docs-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerar docs/INDEX.md
        run: bash scripts/generate-index.sh

      - name: Commitar se houver mudança
        run: |
          if [ -n "$(git status --porcelain docs/INDEX.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/INDEX.md
            git commit -m "chore(docs): regenera INDEX.md [skip ci]"
            git push
          else
            echo "INDEX.md já está atualizado — nada a commitar."
          fi
